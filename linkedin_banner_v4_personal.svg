<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      .bg-primary { fill: #0a0c10; } /* Terminal Body */
      .bg-header { fill: #161b22; } /* Terminal Header */
      
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #d1d5db; }
      .text-accent { fill: #58a6ff; }
      .text-purple { fill: #bc8cff; }
      .text-green { fill: #3fb950; }
    </style>
    
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full Background (matches terminal body) -->
  <rect width="1584" height="396" class="bg-primary" />
  <rect width="1584" height="396" fill="url(#gridPattern)" opacity="0.4" />
  
  <!-- Ambient Glows -->
  <circle cx="1200" cy="200" r="500" fill="url(#glowBlue)" />
  <circle cx="200" cy="400" r="300" fill="url(#glowBlue)" opacity="0.6"/>
  
  <!-- "Safe Zone" Terminal Window
       Instead of being the full canvas, we draw a "Window" outline or header 
       within the safe area.
       Safe Vertical Area: ~85px from top and bottom. 
       Let's place the "Header" at y=70 to be safe.
  -->
  
  <!-- Virtual Window Header at y=70, height 40px -->
  <rect x="0" y="70" width="1584" height="40" class="bg-header" opacity="0.9"/>
  <line x1="0" y1="110" x2="1584" y2="110" stroke="#30363d" stroke-width="1"/>

  <!-- Window Controls (Traffic Lights) - Moved inside safe vertical zone -->
  <g transform="translate(450, 90)">
    <circle cx="0" cy="0" r="6" fill="#ff5f56" />
    <circle cx="20" cy="0" r="6" fill="#ffbd2e" />
    <circle cx="40" cy="0" r="6" fill="#27c93f" />
  </g>
  
  <!-- Window Title -->
  <text x="792" y="95" text-anchor="middle" font-size="14" fill="#8b949e" class="font-mono" letter-spacing="1">mission_control.sh</text>
  
  <!-- Terminal Content 
       Horizontal Safe Zone: Shifted significantly right (>400px) 
       to avoid Mobile Profile Pic (Bottom Left) and Desktop (Left).
       Starting content at x=450.
  -->
  <g transform="translate(450, 160)">
      
      <!-- Command Prompt -->
      <text x="0" y="0" font-size="28" class="font-mono">
          <tspan class="text-green">➜</tspan>
          <tspan class="text-accent"> ~/kone-academy</tspan>
          <tspan class="text-primary"> cat mission.txt</tspan>
      </text>
      
      <!-- Output (Mission) -->
      <text x="0" y="55" font-size="36" class="text-primary" font-weight="800">Bridging the Gap.</text>
      
      <text x="0" y="100" font-size="22" class="text-secondary">
          <tspan>We connect <tspan class="text-accent" font-weight="700">Theoretical Education</tspan> with</tspan>
          <tspan x="0" dy="34">real-world <tspan class="text-purple" font-weight="700">Industry Skills</tspan> via project-based</tspan>
          <tspan x="0" dy="34">coding schools and academic support.</tspan>
      </text>
  </g>

</svg>
