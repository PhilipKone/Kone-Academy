<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kone Code Academy Flyer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0c10;
            --text-primary: #ffffff;
            --accent-blue: #58a6ff;
            --accent-purple: #bc8cff;
            --glass-bg: rgba(22, 27, 34, 0.8);
            --border: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image:
                linear-gradient(rgba(48, 54, 61, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(48, 54, 61, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .flyer-container {
            width: 800px;
            height: 1000px;
            /* A4-ish ratio */
            background: linear-gradient(135deg, rgba(10, 12, 16, 0.95), rgba(22, 27, 34, 0.95));
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 4rem 3rem;
            box-sizing: border-box;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        /* Glow Effects */
        .glow-spot {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            z-index: 0;
        }

        .glow-1 {
            top: -100px;
            left: -100px;
            background: var(--accent-blue);
        }

        .glow-2 {
            bottom: -100px;
            right: -100px;
            background: var(--accent-purple);
        }

        .content {
            z-index: 1;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .logo-img {
            width: 120px;
            height: 120px;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.5));
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1.2rem;
            color: #8b949e;
            margin-top: 1rem;
            font-weight: 400;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .divider {
            width: 100px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            margin: 2.5rem auto;
            border-radius: 2px;
        }

        .services-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            width: 100%;
            margin-bottom: auto;
        }

        .service-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: all 0.3s;
        }

        .service-item:hover {
            background: rgba(88, 166, 255, 0.1);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
        }

        .cta-section {
            margin: 3rem 0;
        }

        .btn-register {
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple));
            color: white;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 800;
            border-radius: 50px;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .contact-section {
            background: rgba(0, 0, 0, 0.3);
            width: 100%;
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.2rem;
            font-family: 'Fira Code', monospace;
        }

        .icon {
            font-size: 1.5rem;
        }
    </style>
</head>

<body>
    <div class="flyer-container">
        <div class="glow-spot glow-1"></div>
        <div class="glow-spot glow-2"></div>

        <div class="content">
            <img src="favicon.png" alt="KCA Logo" class="logo-img">

            <h1>KONE CODE ACADEMY</h1>
            <div class="tagline">Research, code, engineer, the right way</div>

            <div class="divider"></div>

            <div class="services-title">OUR SERVICES</div>

            <div class="services-grid">
                <div class="service-item">Data Analysis</div>
                <div class="service-item">Thesis Writing</div>
                <div class="service-item">Face to Face &<br>Online Tuition</div>
                <div class="service-item">Python Masterclass</div>
                <div class="service-item">C / C++ School</div>
                <div class="service-item">R and MATLAB School</div>
                <div class="service-item" style="grid-column: span 2;">Arduino Programming</div>
            </div>

            <div class="cta-section">
                <a href="#" class="btn-register">Register NOW</a>
            </div>

            <div class="contact-section">
                <div class="contact-item">
                    <span class="icon">📲</span>
                    <span>0551993820 / 0203256481</span>
                </div>
                <div class="contact-item">
                    <span class="icon">📩</span>
                    <span>philipkone45@gmail.com</span>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
