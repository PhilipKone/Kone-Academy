<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3508 5100" width="3508" height="5100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      text {
        font-family: 'Nunito', sans-serif;
      }
      .title-gradient {
        fill: url(#headerGradient);
        font-weight: 800;
      }
      .text-blue { fill: #2c4488; }
      .text-green { fill: #28a745; }
    </style>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- SIDE 1: OUTSIDE (Top Half) -->
  <g id="Side1_Outside">
    <!-- Background -->
    <rect width="3508" height="2480" fill="#f0f2f5" />
    <image href="flyer_bg.png" width="3508" height="2480" preserveAspectRatio="none" opacity="0.3"/>
    
    <!-- Guidelines (for reference, remove later) -->
    <!-- Fold Lines: 3508 / 3 = 1169.33 -->
    <line x1="1169" y1="0" x2="1169" y2="2480" stroke="#ccc" stroke-dasharray="10"/>
    <line x1="2338" y1="0" x2="2338" y2="2480" stroke="#ccc" stroke-dasharray="10"/>

    <!-- PANEL 1 (Left): Inside Flap -->
    <g id="Panel1_Flap" transform="translate(0, 0)">
       <text x="584" y="400" text-anchor="middle" font-size="80" class="title-gradient">Why Choose Us?</text>
       
       <g transform="translate(180, 600)">
           <!-- Tagline reuse -->
           <text x="400" y="0" font-size="50" text-anchor="middle" font-weight="700" fill="#8899ac" font-style="italic">
               Research, Code and Engineer
           </text>
           <text x="400" y="70" font-size="50" text-anchor="middle" font-weight="700" fill="#8899ac" font-style="italic">
               the Future the Right Way
           </text>
       </g>
    </g>

    <!-- PANEL 2 (Center): Back Cover (Contact) -->
    <g id="Panel2_Back" transform="translate(1169, 0)">
        <rect x="100" y="800" width="969" height="800" rx="30" fill="white" filter="url(#shadow)"/>
        
        <g transform="translate(484, 950)">
            <text x="0" y="0" text-anchor="middle" font-size="60" class="text-blue" font-weight="800">Contact Us</text>
            
            <!-- Phone -->
            <g transform="translate(0, 150)">
                 <path transform="translate(-320, -40) scale(3)" d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z" fill="#2c4488"/>
                 <text x="0" y="15" text-anchor="middle" font-size="40" class="text-blue" font-weight="700">+233 55 199 3820</text>
            </g>

            <!-- Email -->
            <g transform="translate(0, 300)">
                 <path transform="translate(-380, -40) scale(3)" d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#2c4488"/>
                 <text x="0" y="15" text-anchor="middle" font-size="40" class="text-blue" font-weight="700">philipkone45@gmail.com</text>
            </g>
            
            <!-- QR Code -->
            <g transform="translate(0, 500)">
                <text x="0" y="-30" text-anchor="middle" font-size="36" fill="#8899ac" font-weight="700">Scan to Visit</text>
                <image href="qr_code.png" x="-125" y="0" width="250" height="250" />
                <text x="0" y="290" text-anchor="middle" font-size="32" class="text-blue" font-weight="700">www.koneacademy.io</text>
            </g>
        </g>
    </g>

    <!-- PANEL 3 (Right): Front Cover -->
    <g id="Panel3_Front" transform="translate(2338, 0)">
        <!-- Header Banner -->
        <rect x="80" y="150" width="1000" height="250" rx="20" fill="white" filter="url(#shadow)"/>
        
        <!-- Logo -->
        <g transform="translate(580, 275) scale(0.8)">
            <!-- Reusing logo geometry from flyer -->
            <circle cx="0" cy="0" r="95" fill="#2563eb" />
            <path d="M -40 -45 Q -55 0 -40 45" stroke="white" stroke-width="16" stroke-linecap="round" fill="none" />
            <path d="M 40 -45 Q 55 0 40 45" stroke="white" stroke-width="16" stroke-linecap="round" fill="none" />
            <path d="M 0 -45 C 0 -45 28 -18 28 8 C 28 25 15 38 0 42 C -15 38 -28 25 -28 8 C -28 -18 0 -45 0 -45 Z" fill="white" />
        </g>
        
        <text x="580" y="550" text-anchor="middle" font-size="100" class="title-gradient">Kone Academy</text>
        
        <!-- Student Image Group -->
        <g transform="translate(100, 700)">
             <!-- Blob Background -->
             <path d="M100 100 Q200 0 400 40 T700 200 T800 600 T600 1000 T300 1100 T100 900 T0 500 Z" class="accent-yellow" fill="#fdd835" transform="scale(1.1)"/>
             <defs>
                <clipPath id="brochureBlobClip">
                     <path d="M100 100 Q200 0 400 40 T700 200 T800 600 T600 1000 T300 1100 T100 900 T0 500 Z" transform="scale(1.1)"/>
                </clipPath>
             </defs>
             <image href="student_flyer.png" x="-100" y="-100" width="1200" height="1200" clip-path="url(#brochureBlobClip)" preserveAspectRatio="xMidYMid slice"/>
             
             <!-- Tagline Badge -->
             <rect x="180" y="1200" width="600" height="120" rx="20" fill="rgba(255, 255, 255, 0.95)" filter="url(#shadow)"/>
             <text x="480" y="1280" text-anchor="middle" font-size="50" font-weight="700" fill="#2c4488">Innovate Learn Build</text>
        </g>
    </g>
  </g>

  <!-- SEPARATOR -->
  <line x1="0" y1="2550" x2="3508" y2="2550" stroke="#000" stroke-width="5" stroke-dasharray="20"/>
  <text x="50" y="2530" font-size="60" fill="black">^ OUTSIDE | INSIDE v</text>

  <!-- SIDE 2: INSIDE (Bottom Half) -->
  <g id="Side2_Inside" transform="translate(0, 2600)">
    <!-- Background -->
    <rect width="3508" height="2480" fill="#f0f2f5" />
    <image href="flyer_bg.png" width="3508" height="2480" preserveAspectRatio="none" opacity="0.2"/>

    <!-- Header for Inside -->
    <rect x="1169" y="100" width="1169" height="150" fill="none" />
    <text x="1754" y="200" text-anchor="middle" font-size="90" class="title-gradient">Our Exclusive Services</text>

    <!-- Column 1: Left -->
    <g transform="translate(0, 400)">
        <!-- Service 1 -->
        <g transform="translate(584, 200)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">Data Analysis</text>
             <text x="0" y="220" text-anchor="middle" font-size="30" fill="#555" dy="0">
                 <tspan x="0" dy="0">Professional data insights</tspan>
                 <tspan x="0" dy="40">for your business growth.</tspan>
             </text>
        </g>
        <!-- Service 2 -->
        <g transform="translate(584, 900)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">Thesis Writing</text>
        </g>
    </g>

    <!-- Column 2: Center -->
    <g transform="translate(1169, 400)">
        <!-- Service 3 -->
        <g transform="translate(584, 200)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">F2F &amp; Online</text>
            <text x="0" y="220" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">Tuition</text>
        </g>
        <!-- Service 4 -->
        <g transform="translate(584, 900)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">Python</text>
            <text x="0" y="220" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">Masterclass</text>
        </g>
    </g>

    <!-- Column 3: Right -->
    <g transform="translate(2338, 400)">
        <!-- Service 5 -->
        <g transform="translate(584, 200)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">C/C++ School</text>
        </g>
        <!-- Service 6 -->
        <g transform="translate(584, 900)">
            <circle r="60" fill="#dce4f2" />
            <path transform="translate(-25, -25) scale(2)" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z" fill="#28a745"/>
            <text x="0" y="150" text-anchor="middle" font-size="50" class="text-blue" font-weight="800">R and MATLAB</text>
        </g>
    </g>

  </g>
</svg>
