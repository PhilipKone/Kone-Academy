name: SEO Schema & Meta Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  seo-audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Initialize Public Submodules
      run: |
        git submodule update --init --depth 1 Kone-Farms
        git submodule update --init --depth 1 Kone-Shop

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Run SEO Audit Guardrail
      run: |
        python scripts/seo_audit.py
