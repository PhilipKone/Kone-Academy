<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      .bg-primary { fill: #0a0c10; } /* Terminal Body */
      .bg-header { fill: #161b22; } /* Terminal Header */
      
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #d1d5db; }
      .text-accent { fill: #58a6ff; }
      .text-purple { fill: #bc8cff; }
      .text-green { fill: #3fb950; }
    </style>
    
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Window Body (Full Canvas) -->
  <rect width="1584" height="396" class="bg-primary" />
  <rect width="1584" height="396" fill="url(#gridPattern)" opacity="0.4" />
  
  <!-- Ambient Glows -->
  <circle cx="1200" cy="200" r="500" fill="url(#glowBlue)" />
  <circle cx="200" cy="400" r="300" fill="url(#glowBlue)" opacity="0.6"/>
  
  <!-- Window Header Bar -->
  <rect width="1584" height="48" class="bg-header" />
  
  <!-- Window Controls (Traffic Lights) -->
  <g transform="translate(30, 24)">
    <circle cx="0" cy="0" r="8" fill="#ff5f56" />
    <circle cx="25" cy="0" r="8" fill="#ffbd2e" />
    <circle cx="50" cy="0" r="8" fill="#27c93f" />
  </g>
  
  <!-- Window Title -->
  <text x="792" y="30" text-anchor="middle" font-size="16" fill="#8b949e" class="font-mono" letter-spacing="1">mission_control.sh</text>
  
  <!-- Terminal Content -->
  <!-- Shifted right to avoid Profile Picture area (approx 200px from left is safe, but we also want it centered) -->
  <!-- Let's position it to start around x=300 to be safe and clear -->
  <g transform="translate(300, 120)">
      
      <!-- Command Prompt Line -->
      <text x="0" y="0" font-size="32" class="font-mono">
          <tspan class="text-green">➜</tspan>
          <tspan class="text-accent"> ~/kone-academy</tspan>
          <tspan class="text-primary"> cat mission.txt</tspan>
      </text>
      
      <!-- Command Output -->
      <text x="0" y="70" font-size="44" class="text-primary" font-weight="800">Bridging the Gap.</text>
      
      <text x="0" y="130" font-size="28" class="text-secondary" leading-trim="both">
          <tspan>We connect <tspan class="text-accent" font-weight="700">Theoretical Education</tspan> with</tspan>
          <tspan x="0" dy="46">real-world <tspan class="text-purple" font-weight="700">Industry Skills</tspan> via project-based</tspan>
          <tspan x="0" dy="46">coding schools and academic support.</tspan>
      </text>
  </g>

</svg>
