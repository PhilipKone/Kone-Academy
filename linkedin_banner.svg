<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      .bg-primary { fill: #0a0c10; }
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #8b949e; }
      
      .title-gradient { fill: url(#neonGradient); font-weight: 800; }
    </style>
    
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
    
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#bc8cff" stop-opacity="0.12"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" class="bg-primary" />
  <rect width="1584" height="396" fill="url(#gridPattern)" opacity="0.4" />
  
  <!-- Ambient Glows -->
  <circle cx="1400" cy="50" r="300" fill="url(#glowPurple)" />
  <circle cx="300" cy="350" r="400" fill="url(#glowBlue)" />

  <!-- Content Group (Placed right-center to avoid profile pic in bottom left) -->
  <g transform="translate(680, 140)">
      
      <!-- Logo Mark (Abstract) -->
      <g transform="translate(-140, 20) scale(0.6)">
        <path d="M 60 55 Q 45 100 60 145" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" />
        <path d="M 140 55 Q 155 100 140 145" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" />
        <path d="M 100 55 C 100 55 128 82 128 108 C 128 125 115 138 100 142 C 85 138 72 125 72 108 C 72 82 100 55 100 55 Z" fill="#58a6ff" />
      </g>
      
      <!-- Text -->
      <text x="0" y="45" font-size="60" class="title-gradient" letter-spacing="1">Kone Academy</text>
      <text x="5" y="95" font-size="24" class="text-secondary" letter-spacing="3">BRIDGING THE GAP</text>
      
      <!-- Code Snippet Decor -->
      <g transform="translate(480, 0)" opacity="0.6">
        <text x="0" y="20" font-size="14" class="font-mono" fill="#58a6ff">def future():</text>
        <text x="20" y="45" font-size="14" class="font-mono" fill="#8b949e">skills = ["AI", "Code"]</text>
        <text x="20" y="70" font-size="14" class="font-mono" fill="#green">return success</text>
      </g>
  </g>

</svg>
