<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      .bg-primary { fill: #0a0c10; }
      .bg-glass { fill: rgba(22, 27, 34, 0.95); stroke: #30363d; stroke-width: 2; }
      
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #d1d5db; } /* Lighter grey for better contrast on background */
      .text-accent { fill: #58a6ff; }
      .text-purple { fill: #bc8cff; }
      .text-green { fill: #3fb950; }
      
      .title-gradient { fill: url(#neonGradient); font-weight: 800; }
    </style>
    
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#bc8cff" />
    </linearGradient>
    
    <pattern id="gridPattern" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" class="bg-primary" />
  <rect width="1584" height="396" fill="url(#gridPattern)" opacity="0.4" />
  
  <!-- Ambient Glows -->
  <circle cx="1200" cy="200" r="400" fill="url(#glowBlue)" />

  <!-- LEFT: Branding (Smaller, less dominant) -->
  <g transform="translate(150, 140)">
      <!-- Logo Mark -->
       <g transform="translate(0, 0) scale(0.4)">
           <g transform="translate(-100, -100)">
            <circle cx="100" cy="100" r="95" fill="none" stroke="#58a6ff" stroke-width="4"/>
            <path d="M 60 55 Q 45 100 60 145" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M 140 55 Q 155 100 140 145" stroke="#ffffff" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M 100 55 C 100 55 128 82 128 108 C 128 125 115 138 100 142 C 85 138 72 125 72 108 C 72 82 100 55 100 55 Z" fill="#58a6ff" />
           </g>
       </g>
       <text x="70" y="40" font-size="40" class="title-gradient" letter-spacing="1">Kone Academy</text>
  </g>

  <!-- RIGHT: Terminal Window (Scaled to fit) -->
  <g transform="translate(650, 48) scale(0.8)">
      <!-- Glass Card Window -->
      <rect width="1000" height="400" rx="12" class="bg-glass" />
      
      <!-- Terminal Header -->
      <path d="M1 12 Q 1 1 12 1 L 988 1 Q 999 1 999 12 L 999 40 L 1 40 Z" fill="#21262d" />
      <circle cx="30" cy="20" r="6" fill="#ff5f56" />
      <circle cx="50" cy="20" r="6" fill="#ffbd2e" />
      <circle cx="70" cy="20" r="6" fill="#27c93f" />
      <text x="500" y="25" text-anchor="middle" font-size="16" fill="#8b949e" class="font-mono">mission_control.sh</text>

      <!-- Terminal Content -->
      <g transform="translate(40, 90)">
          <!-- Command Line -->
          <text x="0" y="0" font-size="28" class="font-mono">
              <tspan class="text-green">➜</tspan>
              <tspan class="text-accent"> ~/kone-academy</tspan>
              <tspan class="text-primary"> cat mission.txt</tspan>
          </text>
          
          <!-- Output -->
          <text x="0" y="60" font-size="32" class="text-primary" font-weight="700">Bridging the Gap.</text>
          <text x="0" y="110" font-size="24" class="text-secondary">
              We connect <tspan class="text-accent" font-weight="700">Theoretical Education</tspan> with
              <tspan x="0" dy="40">real-world <tspan class="text-purple" font-weight="700">Industry Skills</tspan> via project-based</tspan>
              <tspan x="0" dy="40">coding schools and academic support.</tspan>
          </text>
      </g>
  </g>
</svg>
