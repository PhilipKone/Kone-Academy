<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2500" width="1200" height="2500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap'); /* For terminal look */
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      /* Light Theme Pallete (V3) */
      .bg-primary { fill: #f9fafb; }
      .bg-secondary { fill: #ffffff; }
      .bg-glass { fill: rgba(255, 255, 255, 0.65); stroke: #d0d7de; stroke-width: 2; }
      
      .text-primary { fill: #1f2328; }
      .text-secondary { fill: #656d76; }
      
      /* Accents: Slightly Darker for Contrast on White */
      .text-accent { fill: #0969da; } /* Darker Blue */
      .text-purple { fill: #8250df; } /* Darker Purple */
      .text-green { fill: #1a7f37; } /* Darker Green */
      
      .title-gradient { fill: url(#neonGradient); font-weight: 800; }
      
    </style>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0969da" />
      <stop offset="50%" stop-color="#8250df" />
      <stop offset="100%" stop-color="#1a7f37" /> 
    </linearGradient>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#0969da" stop-opacity="0.05"/>
         <stop offset="100%" stop-color="#f9fafb" stop-opacity="0"/>
    </radialGradient>
    
    <!-- Subtler drop shadow for light mode instead of neon glow -->
    <filter id="lightShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/> <!-- stdDeviation is how much to blur -->
      <feOffset dx="2" dy="4" result="offsetblur"/> <!-- how much to offset -->
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2"/> <!-- opacity of the shadow -->
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode/> <!-- this contains the offset blurred image -->
        <feMergeNode in="SourceGraphic"/> <!-- this contains the element that the filter is applied to -->
      </feMerge>
    </filter>

    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2500" class="bg-primary" />
  
  <!-- Ambient Glows -->
  <circle cx="200" cy="200" r="400" fill="url(#glowBlue)" />
  <circle cx="1000" cy="1000" r="500" fill="url(#glowBlue)" opacity="0.5"/>
  <circle cx="0" cy="2000" r="600" fill="url(#glowBlue)" opacity="0.6"/>

  <!-- 1. HEADER SECTION -->
  <!-- Header Bar -->
   <g transform="translate(0, 0)">
       <!-- Top thin gradient line -->
       <line x1="0" y1="0" x2="1200" y2="0" stroke="url(#neonGradient)" stroke-width="10" />
       
       <!-- Logo (Left Aligned relative to center) -->
       <!-- Logo centered at x=350, y=180 -->
       <g transform="translate(350, 180) scale(0.4)">
           <g transform="translate(-100, -100)">
            <circle cx="100" cy="100" r="95" fill="none" stroke="#0969da" stroke-width="4" filter="url(#lightShadow)"/>
            <path d="M 60 55 Q 45 100 60 145" stroke="#1f2328" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M 140 55 Q 155 100 140 145" stroke="#1f2328" stroke-width="12" stroke-linecap="round" fill="none" />
            <path d="M 100 55 C 100 55 128 82 128 108 C 128 125 115 138 100 142 C 85 138 72 125 72 108 C 72 82 100 55 100 55 Z" fill="#0969da" />
           </g>
       </g>
       
       <!-- Title Text (Right Aligned relative to logo) -->
       <text x="410" y="205" text-anchor="start" font-size="70" class="title-gradient">Kone Academy</text>
       
       <text x="600" y="270" text-anchor="middle" font-size="32" class="text-secondary">Strategic Business Roadmap</text>
   </g>

  <!-- 2. EXECUTIVE SUMMARY (Terminal Style) -->
  <g transform="translate(100, 450)">
      <!-- Glass Card Window -->
      <rect width="1000" height="400" rx="12" class="bg-glass" filter="url(#lightShadow)"/>
      
      <!-- Terminal Header -->
      <path d="M1 12 Q 1 1 12 1 L 988 1 Q 999 1 999 12 L 999 40 L 1 40 Z" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1" />
      <circle cx="30" cy="20" r="6" fill="#ff5f56" />
      <circle cx="50" cy="20" r="6" fill="#ffbd2e" />
      <circle cx="70" cy="20" r="6" fill="#27c93f" />
      <text x="500" y="25" text-anchor="middle" font-size="16" fill="#656d76" class="font-mono">mission_control.sh</text>

      <!-- Terminal Content -->
      <g transform="translate(40, 90)">
          <!-- Command Line -->
          <text x="0" y="0" font-size="28" class="font-mono">
              <tspan class="text-green">➜</tspan>
              <tspan class="text-accent"> ~/kone-academy</tspan>
              <tspan class="text-primary"> cat mission.txt</tspan>
          </text>
          
          <!-- Output -->
          <text x="0" y="60" font-size="32" class="text-primary" font-weight="700">Bridging the Gap.</text>
          <text x="0" y="110" font-size="24" class="text-secondary">
              We connect <tspan class="text-accent" font-weight="700">Theoretical Education</tspan> with
              <tspan x="0" dy="40">real-world <tspan class="text-purple" font-weight="700">Industry Skills</tspan> via project-based</tspan>
              <tspan x="0" dy="40">coding schools and academic support.</tspan>
          </text>
      </g>
  </g>

  <!-- 3. REVENUE STREAMS (Glass Cards) -->
  <g transform="translate(100, 950)">
      <text x="500" y="0" text-anchor="middle" font-size="50" class="text-primary" font-weight="800">Revenue Streams</text>
      
      <!-- Stream 1: Education (Blue accent) -->
      <g transform="translate(0, 60)">
          <rect width="480" height="420" rx="12" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)" />
          <!-- Accent Line Top -->
          <line x1="20" y1="2" x2="460" y2="2" stroke="#0969da" stroke-width="4" />
          
          <text x="240" y="60" text-anchor="middle" font-size="36" class="text-accent" font-weight="800">Education Hub</text>
          
          <g transform="translate(40, 120)">
            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, -10) scale(0.6)"/>
            <text x="40" y="10" font-size="26" class="text-primary" font-weight="700">Python Masterclass</text>
            <text x="40" y="40" font-size="20" class="text-secondary">Data Science &amp; AI Bootcamps</text>

            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, 80) scale(0.6)"/>
            <text x="40" y="100" font-size="26" class="text-primary" font-weight="700">C/C++ School</text>
            <text x="40" y="130" font-size="20" class="text-secondary">Systems Programming</text>

            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, 170) scale(0.6)"/>
            <text x="40" y="190" font-size="26" class="text-primary" font-weight="700">Tuition Services</text>
            <text x="40" y="220" font-size="20" class="text-secondary">Academic Support</text>
          </g>
      </g>

      <!-- Stream 2: Services (Purple accent) -->
      <g transform="translate(520, 60)">
          <rect width="480" height="420" rx="12" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)" />
          <!-- Accent Line Top -->
          <line x1="20" y1="2" x2="460" y2="2" stroke="#8250df" stroke-width="4" />
          
          <text x="240" y="60" text-anchor="middle" font-size="36" class="text-purple" font-weight="800">Services &amp; R&amp;D</text>
          
          <g transform="translate(40, 120)">
            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, -10) scale(0.6)"/>
            <text x="40" y="10" font-size="26" class="text-primary" font-weight="700">Data Consultancy</text>
            <text x="40" y="40" font-size="20" class="text-secondary">B2B Insights &amp; Analytics</text>

            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, 80) scale(0.6)"/>
            <text x="40" y="100" font-size="26" class="text-primary" font-weight="700">Thesis Support</text>
            <text x="40" y="130" font-size="20" class="text-secondary">Research Implementation</text>

            <path d="M10 20 L25 35 L50 5" stroke="#1a7f37" stroke-width="4" fill="none" transform="translate(0, 170) scale(0.6)"/>
            <text x="40" y="190" font-size="26" class="text-primary" font-weight="700">Software Dev</text>
            <text x="40" y="220" font-size="20" class="text-secondary">Web &amp; Custom Tools</text>
          </g>
      </g>
  </g>

  <!-- 4. GROWTH ROADMAP (Light Cards) -->
  <g transform="translate(100, 1500)">
      <text x="500" y="0" text-anchor="middle" font-size="50" class="text-primary" font-weight="800">Growth Phases</text>
      
      <!-- Phase 1 -->
      <g transform="translate(0, 60)">
          <rect width="300" height="150" rx="10" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)"/>
          <text x="20" y="40" font-size="40" class="text-accent" font-weight="900">01</text>
          <text x="20" y="80" font-size="24" class="text-primary" font-weight="700">Launch</text>
          <text x="20" y="110" font-size="18" class="text-secondary">Setup Core Schools</text>
      </g>

      <!-- Phase 2 -->
      <g transform="translate(350, 60)">
          <rect width="300" height="150" rx="10" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)"/>
          <text x="20" y="40" font-size="40" class="text-purple" font-weight="900">02</text>
          <text x="20" y="80" font-size="24" class="text-primary" font-weight="700">Growth</text>
          <text x="20" y="110" font-size="18" class="text-secondary">Corporate Partners</text>
      </g>

      <!-- Phase 3 -->
      <g transform="translate(700, 60)">
          <rect width="300" height="150" rx="10" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)"/>
          <text x="20" y="40" font-size="40" class="text-green" font-weight="900">03</text>
          <text x="20" y="80" font-size="24" class="text-primary" font-weight="700">Scale</text>
          <text x="20" y="110" font-size="18" class="text-secondary">Global LMS Platform</text>
      </g>
  </g>

  <!-- 5. FINANCIAL PROJECTION (Light Chart) -->
  <g transform="translate(100, 1800)">
      <rect width="1000" height="400" rx="20" class="bg-secondary" stroke="#d0d7de" stroke-width="1" filter="url(#lightShadow)"/>
      <text x="50" y="60" font-size="32" class="text-primary" font-weight="800">Projected Revenue</text>
      
      <!-- Chart Area -->
      <g transform="translate(100, 320)">
          <!-- Axis -->
          <line x1="0" y1="0" x2="800" y2="0" stroke="#d0d7de" stroke-width="2" />
          
          <!-- Bar 1 -->
          <rect x="50" y="-80" width="100" height="80" fill="#0969da" opacity="0.6"/>
          <text x="100" y="30" text-anchor="middle" font-size="20" class="text-secondary">Year 1</text>
          <text x="100" y="-90" text-anchor="middle" font-size="20" class="text-accent" font-weight="bold">₵5k</text>
          
          <!-- Bar 2 -->
          <rect x="250" y="-150" width="100" height="150" fill="#1a7f37" opacity="0.6"/>
          <text x="300" y="30" text-anchor="middle" font-size="20" class="text-secondary">Year 2</text>
           <text x="300" y="-160" text-anchor="middle" font-size="20" class="text-green" font-weight="bold">₵12k</text>

          <!-- Bar 3 -->
          <rect x="450" y="-220" width="100" height="220" fill="#8250df" opacity="0.6"/>
          <text x="500" y="30" text-anchor="middle" font-size="20" class="text-secondary">Year 3</text>
           <text x="500" y="-230" text-anchor="middle" font-size="20" class="text-purple" font-weight="bold">₵25k</text>
           
           <!-- Bar 4 (Gradient) -->
           <rect x="650" y="-300" width="100" height="300" fill="url(#neonGradient)" />
           <text x="700" y="30" text-anchor="middle" font-size="20" class="text-secondary">Year 4</text>
            <text x="700" y="-310" text-anchor="middle" font-size="20" fill="#1a7f37" font-weight="bold">₵40k+</text>
      </g>
  </g>

  <!-- Website Link -->
  <text x="600" y="2350" text-anchor="middle" font-size="24" class="text-secondary" letter-spacing="2" opacity="0.8">www.koneacademy.io</text>

</svg>
