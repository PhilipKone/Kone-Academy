<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 851 315" width="851" height="315">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
      
      text { font-family: 'Nunito', sans-serif; }
      .font-mono { font-family: 'Fira Code', monospace; }
      
      .bg-primary { fill: #0a0c10; }
      .bg-header { fill: #161b22; }
      
      .text-primary { fill: #ffffff; }
      .text-secondary { fill: #d1d5db; }
      .text-accent { fill: #58a6ff; }
      .text-purple { fill: #bc8cff; }
      .text-green { fill: #3fb950; }
    </style>
    
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"/>
    </pattern>
    
    <radialGradient id="glowBlue" cx="50%" cy="50%" r="50%">
         <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.15"/>
         <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="851" height="315" class="bg-primary" />
  <rect width="851" height="315" fill="url(#gridPattern)" opacity="0.4" />
  
  <circle cx="700" cy="100" r="250" fill="url(#glowBlue)" />
  <circle cx="200" cy="250" r="200" fill="url(#glowBlue)" opacity="0.6"/>

  <!-- Terminal Window - Centered in Safe Zone (640px wide)
       Center x = 425.5
       Safe Zone Width = 640
       Left Edge of Safe Zone = 425.5 - 320 = 105.5
       Right Edge of Safe Zone = 425.5 + 320 = 745.5
       
       We will position content starting around x=130 to be safely inside the 105 edge.
  -->

  <!-- Header Bar -->
  <rect x="0" y="20" width="851" height="36" class="bg-header" opacity="0.9"/>
  <line x1="0" y1="56" x2="851" y2="56" stroke="#30363d" stroke-width="1"/>

  <!-- Window Controls - Centered/Leftish? 
       To look like a window, controls are usually left. 
       But if cropped, they might disappear. 
       Let's put controls at x=130 (inside Safe Zone).
  -->
  <g transform="translate(130, 38)">
    <circle cx="0" cy="0" r="6" fill="#ff5f56" />
    <circle cx="20" cy="0" r="6" fill="#ffbd2e" />
    <circle cx="40" cy="0" r="6" fill="#27c93f" />
  </g>
  
  <!-- Window Title -->
  <text x="425" y="43" text-anchor="middle" font-size="14" fill="#8b949e" class="font-mono" letter-spacing="1">mission_control.sh</text>
  
  <!-- Content - Left Aligned to Safe Zone Start (x=130) -->
  <g transform="translate(130, 95)">
      <!-- Prompt -->
      <text x="0" y="0" font-size="20" class="font-mono">
          <tspan class="text-green">➜</tspan>
          <tspan class="text-accent"> ~/kone-academy</tspan>
          <tspan class="text-primary"> cat mission.txt</tspan>
      </text>
      
      <!-- Output -->
      <text x="0" y="50" font-size="32" class="text-primary" font-weight="800">Bridging the Gap.</text>
      
      <text x="0" y="95" font-size="18" class="text-secondary">
          <tspan>We connect <tspan class="text-accent" font-weight="700">Theoretical Education</tspan> with</tspan>
          <tspan x="0" dy="28">real-world <tspan class="text-purple" font-weight="700">Industry Skills</tspan> via project-based</tspan>
          <tspan x="0" dy="28">coding schools and academic support.</tspan>
      </text>
  </g>
</svg>
