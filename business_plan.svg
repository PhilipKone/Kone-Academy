<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 2500" width="1200" height="2500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&amp;display=swap');
      text { font-family: 'Nunito', sans-serif; }
      .title-gradient { fill: url(#headerGradient); font-weight: 800; }
      .text-blue { fill: #2c4488; }
      .text-white { fill: #ffffff; }
      .text-gray { fill: #555555; }
      .card-bg { fill: #ffffff; }
      .accent-bg { fill: #f0f2f5; }
    </style>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="2500" fill="#f8f9fa" />
  <image href="flyer_bg.png" width="1200" height="2500" preserveAspectRatio="none" opacity="0.1"/>

  <!-- 1. HEADER SECTION -->
  <path d="M0 0 H1200 V300 Q600 350 0 300 Z" fill="url(#headerGradient)" />
  
  <!-- Logo Circle -->
  <circle cx="600" cy="120" r="80" fill="white" />
  <g transform="translate(600, 120) scale(0.35)">
       <!-- Logo Asset Reuse -->
       <g transform="translate(-100, -100)">
        <circle cx="100" cy="100" r="95" fill="#2563eb" />
        <path d="M 60 55 Q 45 100 60 145" stroke="white" stroke-width="16" stroke-linecap="round" fill="none" />
        <path d="M 140 55 Q 155 100 140 145" stroke="white" stroke-width="16" stroke-linecap="round" fill="none" />
        <path d="M 100 55 C 100 55 128 82 128 108 C 128 125 115 138 100 142 C 85 138 72 125 72 108 C 72 82 100 55 100 55 Z" fill="white" />
       </g>
  </g>
  
  <text x="600" y="250" text-anchor="middle" font-size="60" fill="white" font-weight="800">KONE ACADEMY</text>
  <text x="600" y="290" text-anchor="middle" font-size="28" fill="rgba(255,255,255,0.9)" font-weight="600">Strategic Business Roadmap</text>

  <!-- 2. EXECUTIVE SUMMARY -->
  <g transform="translate(100, 400)">
      <rect width="1000" height="350" rx="20" class="card-bg" filter="url(#shadow)" />
      <text x="50" y="60" font-size="40" class="text-blue" font-weight="800">The Problem &amp; Solution</text>
      <line x1="50" y1="80" x2="350" y2="80" stroke="#7c3aed" stroke-width="4" />
      
      <!-- Problem -->
      <g transform="translate(50, 130)">
          <circle cx="25" cy="-10" r="25" fill="#ffebee" />
          <text x="0" y="0" text-anchor="middle" font-size="30" fill="#d32f2f">!</text>
          <text x="70" y="0" font-size="28" font-weight="700" fill="#d32f2f">The Problem</text>
          <text x="70" y="40" font-size="24" class="text-gray" width="400">
              Gap between theoretical university 
              <tspan x="70" dy="30">education and practical industry skills.</tspan>
          </text>
      </g>
      
      <!-- Solution -->
      <g transform="translate(550, 130)">
          <circle cx="25" cy="-10" r="25" fill="#e8f5e9" />
          <text x="25" y="0" text-anchor="middle" font-size="30" fill="#28a745">✓</text>
          <text x="70" y="0" font-size="28" font-weight="700" fill="#28a745">Our Solution</text>
          <text x="70" y="40" font-size="24" class="text-gray">
              Project-based coding schools,
              <tspan x="70" dy="30">Masterclasses, and Academic Support.</tspan>
          </text>
      </g>
  </g>

  <!-- 3. REVENUE STREAMS -->
  <g transform="translate(100, 800)">
      <text x="500" y="0" text-anchor="middle" font-size="50" class="title-gradient">Business Model</text>
      
      <!-- Stream 1: Education -->
      <g transform="translate(0, 50)">
          <rect width="480" height="400" rx="20" class="card-bg" filter="url(#shadow)" />
          <rect width="480" height="10" rx="5" fill="#2563eb" /> <!-- Top Bar Color -->
          
          <text x="240" y="60" text-anchor="middle" font-size="36" class="text-blue" font-weight="800">Education Hub</text>
          
          <g transform="translate(40, 120)">
              <text x="0" y="0" font-size="28" fill="#333" font-weight="700">• Python Masterclass</text>
              <text x="20" y="30" font-size="20" class="text-gray">Bootcamps on Data Science &amp; AI</text>
              
              <text x="0" y="80" font-size="28" fill="#333" font-weight="700">• C/C++ School</text>
              <text x="20" y="110" font-size="20" class="text-gray">Core programming foundations</text>

              <text x="0" y="160" font-size="28" fill="#333" font-weight="700">• Tuition Services</text>
              <text x="20" y="190" font-size="20" class="text-gray">F2F &amp; Online Academic Support</text>
          </g>
      </g>

      <!-- Stream 2: Services -->
      <g transform="translate(520, 50)">
          <rect width="480" height="400" rx="20" class="card-bg" filter="url(#shadow)" />
          <rect width="480" height="10" rx="5" fill="#7c3aed" /> <!-- Top Bar Color -->
          
          <text x="240" y="60" text-anchor="middle" font-size="36" class="text-blue" font-weight="800">Consultancy Services</text>
          
          <g transform="translate(40, 120)">
              <text x="0" y="0" font-size="28" fill="#333" font-weight="700">• Data Analysis</text>
              <text x="20" y="30" font-size="20" class="text-gray">B2B/B2C Insights &amp; Reporting</text>
              
              <text x="0" y="80" font-size="28" fill="#333" font-weight="700">• Thesis Support</text>
              <text x="20" y="110" font-size="20" class="text-gray">Code implementation for research</text>
              
              <text x="0" y="160" font-size="28" fill="#333" font-weight="700">• Custom Development</text>
              <text x="20" y="190" font-size="20" class="text-gray">Web &amp; Software Solutions</text>
          </g>
      </g>
  </g>

  <!-- 4. GROWTH ROADMAP -->
  <g transform="translate(100, 1350)">
      <text x="500" y="0" text-anchor="middle" font-size="50" class="title-gradient">Growth Roadmap</text>
      
      <!-- Timeline Line -->
      <line x1="500" y1="80" x2="500" y2="550" stroke="#ddd" stroke-width="4" stroke-dasharray="10"/>
      
      <!-- Phase 1 -->
      <g transform="translate(0, 80)">
         <circle cx="500" cy="50" r="20" fill="#2563eb" />
         <text x="500" y="55" text-anchor="middle" fill="white" font-size="20" font-weight="bold">1</text>
         
         <rect x="0" y="0" width="450" height="100" rx="10" class="card-bg" filter="url(#shadow)" />
         <text x="20" y="40" font-size="24" class="text-blue" font-weight="800">Phase 1: Foundation</text>
         <text x="20" y="70" font-size="20" class="text-gray">Launch Core Schools &amp; Brand Awareness</text>
      </g>

      <!-- Phase 2 -->
      <g transform="translate(550, 230)">
         <circle cx="-50" cy="50" r="20" fill="#2563eb" />
         <text x="-50" y="55" text-anchor="middle" fill="white" font-size="20" font-weight="bold">2</text>
         
         <rect x="0" y="0" width="450" height="100" rx="10" class="card-bg" filter="url(#shadow)" />
         <text x="20" y="40" font-size="24" class="text-blue" font-weight="800">Phase 2: Partnerships</text>
         <text x="20" y="70" font-size="20" class="text-gray">Corporate Training &amp; Campus Ambassadors</text>
      </g>

      <!-- Phase 3 -->
      <g transform="translate(0, 380)">
         <circle cx="500" cy="50" r="20" fill="#7c3aed" />
         <text x="500" y="55" text-anchor="middle" fill="white" font-size="20" font-weight="bold">3</text>
         
         <rect x="0" y="0" width="450" height="100" rx="10" class="card-bg" filter="url(#shadow)" />
         <text x="20" y="40" font-size="24" class="text-blue" font-weight="800">Phase 3: Scale Up</text>
         <text x="20" y="70" font-size="20" class="text-gray">Launch Online LMS &amp; Global Reach</text>
      </g>
  </g>

  <!-- 5. FINANCIAL PROJECTION (Chart) -->
  <g transform="translate(100, 2000)">
      <rect width="1000" height="400" rx="20" class="card-bg" filter="url(#shadow)" />
      <text x="50" y="60" font-size="36" class="text-blue" font-weight="800">Proj. Revenue Growth</text>
      
      <!-- Chart Area -->
      <g transform="translate(100, 320)">
          <!-- Axis -->
          <line x1="0" y1="0" x2="800" y2="0" stroke="#ccc" stroke-width="2" />
          <line x1="0" y1="0" x2="0" y2="-200" stroke="#ccc" stroke-width="2" />
          
          <!-- Bar 1: Year 1 -->
          <rect x="50" y="-80" width="100" height="80" fill="#90caf9" />
          <text x="100" y="30" text-anchor="middle" font-size="20" fill="#555">Year 1</text>
          <text x="100" y="-90" text-anchor="middle" font-size="20" fill="#2563eb" font-weight="bold">$50k</text>
          
          <!-- Bar 2: Year 2 -->
          <rect x="250" y="-150" width="100" height="150" fill="#42a5f5" />
          <text x="300" y="30" text-anchor="middle" font-size="20" fill="#555">Year 2</text>
           <text x="300" y="-160" text-anchor="middle" font-size="20" fill="#2563eb" font-weight="bold">$120k</text>

          <!-- Bar 3: Year 3 -->
          <rect x="450" y="-220" width="100" height="220" fill="#1e88e5" />
          <text x="500" y="30" text-anchor="middle" font-size="20" fill="#555">Year 3</text>
           <text x="500" y="-230" text-anchor="middle" font-size="20" fill="#2563eb" font-weight="bold">$250k</text>
           
           <!-- Bar 4: Year 4 -->
           <rect x="650" y="-300" width="100" height="300" fill="url(#headerGradient)" />
           <text x="700" y="30" text-anchor="middle" font-size="20" fill="#555">Year 4</text>
            <text x="700" y="-310" text-anchor="middle" font-size="20" fill="#7c3aed" font-weight="bold">$400k+</text>
      </g>
  </g>

</svg>
